name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches crate versions
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          version="${GITHUB_REF_NAME#v}"
          for manifest in chizu-core/Cargo.toml chizu-index/Cargo.toml chizu-query/Cargo.toml chizu-cli/Cargo.toml; do
            if ! grep -q "^version = \"$version\"$" "$manifest"; then
              echo "::error file=$manifest::expected version $version"
              exit 1
            fi
          done

      - name: Check workspace
        run: cargo check --workspace --locked

      - name: Test workspace
        run: cargo test --workspace --locked

      - name: Package chizu-core
        run: cargo package --package chizu-core --locked

  github_release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" {capture=1}
            capture {
              if ($0 ~ "^## \\[" && $0 !~ "^## \\[" version "\\]") exit
              print
            }
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::No CHANGELOG entry found for $version"
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
