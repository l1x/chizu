[workspace]
resolver = "2"
members = ["crates/chizu-core", "crates/chizu-cli"]

[workspace.dependencies]
rusqlite = { version = "0.39", features = ["bundled"] }
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
blake3 = "1"
reqwest = { version = "0", features = ["blocking", "json", "rustls-tls"], default-features = false }
toml = "0.8"
argh = "0.1"
tracing = "0.1"
usearch = "2"
