[workspace]
resolver = "2"
members = ["chizu-cli", "chizu-core"]

[workspace.dependencies]
argh = "0.1"
blake3 = "1"
reqwest = { version = "0", default-features = false, features = [
  "blocking",
  "json",
  "rustls-tls"
] }
rusqlite = { version = "0.39", features = ["bundled"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
toml = "0.8"
tracing = "0.1"
usearch = "2"
