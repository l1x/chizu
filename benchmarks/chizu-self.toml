[[queries]]
text = "Entity"
bucket = "identifier"
relevant = [
    "symbol::chizu-core/src/model/entity.rs::Entity",
]
acceptable = [
    "source_unit::chizu-core/src/model/entity.rs",
    "symbol::chizu-core/src/model/entity.rs::EntityKind",
]

