# Chizu self-evaluation benchmark
#
# Run against chizu's own indexed codebase:
#   chizu index && chizu eval benchmarks/chizu-self.toml
#
# Entity IDs are predictions based on the codebase structure.
# After indexing, verify IDs with: chizu entities --kind symbol
# Update any mismatched IDs before trusting eval results.
#
# How to extend:
#   1. Add a new [[queries]] entry below
#   2. Set bucket to "identifier", "concept", or "task"
#   3. List relevant entity IDs (primary matches that must appear in top-k)
#   4. List acceptable entity IDs (useful supporting results)
#   5. Re-run: chizu eval benchmarks/chizu-self.toml

version = 1

# ---------------------------------------------------------------------------
# Identifier queries — exact function/type/module names
# ---------------------------------------------------------------------------

[[queries]]
text = "SearchPipeline"
bucket = "identifier"
relevant = [
    "symbol::chizu-query/src/pipeline.rs::SearchPipeline",
]
acceptable = [
    "source_unit::chizu-query/src/pipeline.rs",
]

[[queries]]
text = "Config"
bucket = "identifier"
relevant = [
    "symbol::chizu-core/src/config/mod.rs::Config",
]
acceptable = [
    "source_unit::chizu-core/src/config/mod.rs",
]

[[queries]]
text = "classify_query"
bucket = "identifier"
relevant = [
    "symbol::chizu-core/src/query/classifier.rs::classify_query",
]
acceptable = [
    "source_unit::chizu-core/src/query/classifier.rs",
]

[[queries]]
