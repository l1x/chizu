# Chizu self-evaluation benchmark
#
# Run against chizu's own indexed codebase:
#   chizu index && chizu eval benchmarks/chizu-self.toml
#
# Entity IDs verified against actual index output (2026-04-08).
#
# How to extend:
#   1. Add a new [[queries]] entry below
#   2. Set bucket to "identifier", "concept", or "task"
#   3. Run `chizu search "<query>" --show-all --format json` to see actual IDs
#   4. Label relevant (must appear in top-k) and acceptable (useful supporting)
#   5. Re-run: chizu eval benchmarks/chizu-self.toml

version = 1

# ---------------------------------------------------------------------------
# Identifier queries — exact function/type/module names
# ---------------------------------------------------------------------------

[[queries]]
text = "SearchPipeline"
bucket = "identifier"
relevant = [
    "symbol::chizu-query/src/pipeline.rs::SearchPipeline",
]
acceptable = [
    "symbol::chizu-index/src/indexer.rs::IndexPipeline",
    "symbol::chizu-query/src/retrieval.rs::retrieve",
]

[[queries]]
text = "Config"
bucket = "identifier"
relevant = [
    "symbol::chizu-core/src/config/mod.rs::Config",
]
acceptable = [
    "symbol::chizu-core/src/config/mod.rs::SearchConfig",
    "symbol::chizu-core/src/config/mod.rs::ConfigError",
    "symbol::chizu-core/src/config/mod.rs::from_toml",
]

