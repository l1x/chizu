[index]
exclude_patterns = [
    "**/target/**",
    "**/.git/**",
    "**/node_modules/**",
    "**/.venv/**",
    "**/fuzz/**",
    "**/*.lock",
]

[search]
default_limit = 15
cutoff = "relative_gap"
relative_gap_threshold = 0.80
min_results = 3
max_results = 8

[search.rerank_weights]
task_route = 0.00
keyword = 0.25
name_match = 0.20
vector = 0.25
kind_preference = 0.10
exported = 0.10
path_match = 0.10

[reranker]
enabled = true
flavor = "aws_bedrock"
api_version = "bedrock-rerank-2023-09-30"
provider = "bedrock"
model = "arn:aws:bedrock:eu-central-1::foundation-model/amazon.rerank-v1:0"
top_k = 25
batch_size = 25
timeout_secs = 30

[providers.bedrock]
flavor = "aws_bedrock"
api_version = "bedrock-runtime-2023-09-30"
region = "eu-central-1"
profile = "datadeft-dev"
timeout_secs = 60
retry_attempts = 3

[summary]
provider = "bedrock"
model = "eu.amazon.nova-micro-v1:0"
max_tokens = 512
temperature = 0.2
batch_size = 4
concurrency = 1

[embedding]
provider = "bedrock"
model = "amazon.titan-embed-text-v2:0"
dimensions = 256
batch_size = 32

[visualize]
editor_link = "zed://file/{abs_path}:{line}:{column}"
